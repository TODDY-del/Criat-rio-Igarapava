<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de cadastro de pássaros do Criatório Igarapava — Silvio Moreira. Curiós, Canto e Repetição." />
  <title>Criatório Igarapava — Cadastro de Pássaros</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <nav class="sidebar" role="navigation" aria-label="Navegação principal">



    <!-- Botão: Lista de Pássaros -->
    <button
      class="sidebar-btn active"
      id="btn-lista"
      onclick="mostrarSecao('lista')"
      aria-label="Lista de pássaros cadastrados"
      title="Lista de Pássaros"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
      </svg>
      <span class="tooltip">LISTA DE PÁSSAROS</span>
    </button>

    <!-- Botão: Adicionar Pássaro -->
    <button
      class="sidebar-btn"
      id="btn-adicionar"
      onclick="irParaCadastro()"
      aria-label="Adicionar novo pássaro"
      title="Adicionar Pássaro"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      <span class="tooltip">ADICIONAR PÁSSARO</span>
    </button>

  </nav>

  <!-- ── Main Content ──────────────────────────────────── -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="topbar">
      <span class="topbar-title">CRIATÓRIO IGARAPAVA — CANTO E REPETIÇÃO DE CURIÓS</span>
      <div class="topbar-status">
        <div class="status-dot"></div>
        <span id="status-text">ONLINE</span>
      </div>
    </div>

    <!-- Page: Lista de Pássaros -->
    <section class="page-area" id="secao-lista">

      <!-- Banner de configuração Firebase -->
      <div class="config-banner" id="firebase-banner" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        MODO OFFLINE — Dados salvos localmente. Configure o Firebase em <code>js/firebase-config.js</code> para salvar na nuvem.
      </div>

      <div class="section-header">
        <h1 class="section-title">Pássaros Cadastrados</h1>
        <p class="section-subtitle" id="contador-passaros">CARREGANDO...</p>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input
          type="text"
          id="campo-busca"
          placeholder="Buscar por nome ou código..."
          aria-label="Buscar pássaro"
          oninput="filtrarPassaros(this.value)"
        />
        <div class="search-bar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </div>
      </div>

      <!-- Grid -->
      <div class="birds-grid" id="birds-grid">
        <!-- Preenchido via JS -->
      </div>

    </section>

  </main>

  <!-- ── FAB ────────────────────────────────────────────── -->
  <a class="fab" href="cadastro.html" id="fab-adicionar" aria-label="Adicionar novo pássaro">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    ADICIONAR PÁSSARO
  </a>

  <!-- ── Toast Container ───────────────────────────────── -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ── Loading ───────────────────────────────────────── -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <script type="module">
    import { listarPassaros, deletarPassaro } from './js/cadastro.js';
    import { FIREBASE_CONFIGURED } from './js/firebase-config.js';

    // ── State ────────────────────────────────────────────
    let todosPassaros = [];

    // ── Init ─────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      // Exibe banner se não configurado
      if (!FIREBASE_CONFIGURED) {
        document.getElementById('firebase-banner').style.display = 'flex';
        document.getElementById('status-text').textContent = 'OFFLINE';
      }
      await carregarPassaros();
    });

    // ── Carregar pássaros ────────────────────────────────
    async function carregarPassaros() {
      setLoading(true);
      try {
        todosPassaros = await listarPassaros();
        renderizarPassaros(todosPassaros);
      } catch (e) {
        showToast('Erro ao carregar pássaros: ' + e.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    // ── Renderizar cards ─────────────────────────────────
    function renderizarPassaros(lista) {
      const grid = document.getElementById('birds-grid');
      const contador = document.getElementById('contador-passaros');

      contador.textContent = `${lista.length} PÁSSARO${lista.length !== 1 ? 'S' : ''} CADASTRADO${lista.length !== 1 ? 'S' : ''}`;

      if (lista.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
              </svg>
            </div>
            <h3>Nenhum pássaro cadastrado</h3>
            <p>Clique em "Adicionar Pássaro" para começar</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = lista.map(p => `
        <article class="bird-card" id="card-${p.id}" onclick="verFicha('${p.id}')" style="cursor:pointer;" title="Ver ficha de ${escapeHtml(p.nomePassaro || p.nome || '')}">
          <div class="bird-card-code"># ${p.codigo || '—'}</div>
          <div class="bird-card-name">${escapeHtml(p.nomePassaro || p.nome || 'Sem nome')}</div>
          <div class="bird-card-info">
            <span class="bird-card-sex ${p.sexo === 'FÊMEA' ? 'femea' : 'macho'}">
              ${p.sexo === 'FÊMEA' ? '♀' : '♂'} ${escapeHtml(p.sexo || '')}
            </span>
            <span>${escapeHtml(p.dataNascimento || '—')}</span>
          </div>
          <div style="font-size:12px;color:var(--cor-texto-dim);font-weight:500;">
            NOME: ${escapeHtml(p.nome || '—')}
          </div>
          <div class="bird-card-actions">
            <button class="btn-card-action" onclick="event.stopPropagation(); verFicha('${p.id}')" aria-label="Ver ficha de ${escapeHtml(p.nomePassaro || '')}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="11" height="11">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
              </svg>
              FICHA
            </button>
            <button class="btn-card-action" onclick="event.stopPropagation(); editarPassaro('${p.id}')" aria-label="Editar ${escapeHtml(p.nomePassaro || '')}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="11" height="11">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              EDITAR
            </button>
            <button class="btn-card-action" onclick="event.stopPropagation(); imprimirPassaro('${p.id}')" aria-label="Imprimir ficha de ${escapeHtml(p.nomePassaro || '')}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="11" height="11">
                <polyline points="6 9 6 2 18 2 18 9"/>
                <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                <rect x="6" y="14" width="12" height="8"/>
              </svg>
              IMPRIMIR
            </button>
            <button class="btn-card-action danger" onclick="event.stopPropagation(); confirmarDeletar('${p.id}', '${escapeHtml(p.nomePassaro || p.nome || '')}')" aria-label="Deletar ${escapeHtml(p.nomePassaro || '')}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="11" height="11">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
              </svg>
              DELETAR
            </button>
          </div>
        </article>
      `).join('');
    }

    // ── Filtrar ──────────────────────────────────────────
    window.filtrarPassaros = function(termo) {
      const t = termo.toLowerCase().trim();
      if (!t) { renderizarPassaros(todosPassaros); return; }
      const filtrados = todosPassaros.filter(p =>
        (p.nomePassaro || '').toLowerCase().includes(t) ||
        (p.nome || '').toLowerCase().includes(t) ||
        (p.codigo || '').toLowerCase().includes(t)
      );
      renderizarPassaros(filtrados);
    };

    // ── Confirmar deleção ────────────────────────────────
    window.confirmarDeletar = async function(id, nome) {
      if (!confirm(`Deletar o pássaro "${nome}"? Esta ação não pode ser desfeita.`)) return;
      setLoading(true);
      try {
        await deletarPassaro(id);
        todosPassaros = todosPassaros.filter(p => p.id !== id);
        renderizarPassaros(todosPassaros);
        showToast(`"${nome}" deletado com sucesso.`);
      } catch (e) {
        showToast('Erro ao deletar: ' + e.message, 'error');
      } finally {
        setLoading(false);
      }
    };

    // ── Navegação sidebar ────────────────────────────────
    window.mostrarSecao = function(secao) {
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + secao)?.classList.add('active');
    };

    window.irParaCadastro = function() {
      window.location.href = 'cadastro.html';
    };

    // ── Ir para ficha ─────────────────────────────────────
    window.verFicha = function(id) {
      const passaro = todosPassaros.find(p => p.id === id);
      if (passaro) {
        sessionStorage.setItem('ficha_id', id);
        sessionStorage.setItem('ficha_dados', JSON.stringify(passaro));
      }
      window.location.href = 'ficha.html?id=' + id;
    };

    // ── Imprimir direto da lista ───────────────────────────
    window.imprimirPassaro = function(id) {
      const passaro = todosPassaros.find(p => p.id === id);
      if (passaro) {
        sessionStorage.setItem('ficha_id',        id);
        sessionStorage.setItem('ficha_dados',     JSON.stringify(passaro));
        sessionStorage.setItem('ficha_autoprint', '1');
      }
      window.location.href = 'ficha.html?id=' + id;
    };

    // ── Ir para editar ─────────────────────────────────────
    window.editarPassaro = function(id) {
      const passaro = todosPassaros.find(p => p.id === id);
      if (passaro) {
        sessionStorage.setItem('editar_id',    id);
        sessionStorage.setItem('editar_dados', JSON.stringify(passaro));
      }
      window.location.href = 'editar.html';
    };

    // ── Helpers ──────────────────────────────────────────
    window.showToast = function(msg, tipo = 'success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${tipo}`;
      t.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          ${tipo === 'error'
            ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'
            : '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
        </svg>
        ${msg}
      `;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    };

    function setLoading(v) {
      document.getElementById('loading').style.display = v ? 'flex' : 'none';
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
</html>
